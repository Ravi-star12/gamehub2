<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GameHub Ultra</title>

<style>
body{
margin:0;
font-family:Arial;
background:#1b2838;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#171a21;
height:100vh;
padding:10px;
}

.sidebar h2{
text-align:center;
}

.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
border:none;
background:#2a475e;
color:white;
border-radius:6px;
}

.main{
flex:1;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.games{
display:flex;
flex-wrap:wrap;
}

.card{
background:#2a475e;
margin:10px;
padding:10px;
border-radius:10px;
width:180px;
text-align:center;
}

button.play{
background:#66c0f4;
color:black;
}

canvas{
background:#111;
margin-top:20px;
}

input{
padding:8px;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🎮 GameHub</h2>
<button onclick="show('home')">Início</button>
<button onclick="show('library')">Biblioteca</button>
<button onclick="show('favorites')">Favoritos</button>
</div>

<div class="main">

<div class="top">
<div>👤 <span id="user"></span> | XP: <span id="xp">0</span></div>
<div id="loginBox">
<input id="name" placeholder="Seu nome">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="home">
<h2>Jogos</h2>
<div class="games" id="gameList"></div>
</div>

<div id="library" style="display:none">
<h2>Continue jogando</h2>
<div id="recent"></div>
</div>

<div id="favorites" style="display:none">
<h2>Favoritos ⭐</h2>
<div id="favList"></div>
</div>

<canvas id="game" width="500" height="300"></canvas>

</div>

<script>

let user = localStorage.getItem("user") || ""
let xp = parseInt(localStorage.getItem("xp")) || 0
let favorites = JSON.parse(localStorage.getItem("fav")) || []
let recent = JSON.parse(localStorage.getItem("recent")) || []

document.getElementById("user").innerText = user
document.getElementById("xp").innerText = xp

if(user){
document.getElementById("loginBox").style.display="none"
}

function login(){
let name = document.getElementById("name").value
if(name){
user=name
localStorage.setItem("user",name)
location.reload()
}
}

let games=[
{name:"Mini Game",id:1},
{name:"Em breve",id:2}
]

function show(section){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none")
document.getElementById(section).style.display="block"
}

function renderGames(){
let list=document.getElementById("gameList")
list.innerHTML=""

games.forEach(g=>{
list.innerHTML+=`
<div class="card">
<h3>${g.name}</h3>
<button class="play" onclick="play(${g.id})">Jogar</button>
<button onclick="addFav(${g.id})">⭐</button>
</div>
`
})
}

function addFav(id){
if(!favorites.includes(id)){
favorites.push(id)
localStorage.setItem("fav",JSON.stringify(favorites))
renderFav()
alert("⭐ Favoritado!")
}
}

function renderFav(){
let f=document.getElementById("favList")
f.innerHTML=""
favorites.forEach(id=>{
let g=games.find(x=>x.id==id)
f.innerHTML+=`<p>${g.name}</p>`
})
}

function play(id){
if(!recent.includes(id)){
recent.push(id)
localStorage.setItem("recent",JSON.stringify(recent))
renderRecent()
}

xp+=5
localStorage.setItem("xp",xp)
document.getElementById("xp").innerText=xp

alert("🎮 Jogando!")
}

function renderRecent(){
let r=document.getElementById("recent")
r.innerHTML=""
recent.forEach(id=>{
let g=games.find(x=>x.id==id)
r.innerHTML+=`<p>${g.name}</p>`
})
}

renderGames()
renderFav()
renderRecent()

// MINI JOGO BASE
let x=200,y=120

document.addEventListener("keydown",e=>{
if(e.key=="ArrowUp")y-=10
if(e.key=="ArrowDown")y+=10
if(e.key=="ArrowLeft")x-=10
if(e.key=="ArrowRight")x+=10
})

const c=document.getElementById("game")
const ctx=c.getContext("2d")

function loop(){
ctx.fillStyle="#111"
ctx.fillRect(0,0,500,300)

ctx.fillStyle="#0ff"
ctx.fillRect(x,y,30,30)

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
